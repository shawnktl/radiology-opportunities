name: Weekly Refresh Reporter

# Runs every Sunday at 09:00 UTC.
# Verifies every URL in categories/*.md and reports deadline status.
# Opens a PR with the combined report as the body. No LLM calls — this
# workflow is a reporter only. The "search for new opportunities" step
# is documented in prompts/refresh-agent.md as a manual dispatch.

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run link verifier
        id: verify
        run: |
          python scripts/verify_links.py > links-report.md
          echo "link_status=$(wc -l < links-report.md)" >> "$GITHUB_OUTPUT"

      - name: Run deadline checker
        id: deadlines
        run: |
          python scripts/check_deadlines.py > deadlines-report.md

      - name: Rebuild dashboard
        run: |
          python build.py

      - name: Combine reports
        id: combine
        run: |
          {
            echo "## Weekly Refresh Report"
            echo
            echo "Automated run from \`.github/workflows/weekly-refresh.yml\`."
            echo "This is a reporter workflow — it does not search for new opportunities."
            echo "Use \`prompts/refresh-agent.md\` to dispatch a manual search."
            echo
            cat deadlines-report.md
            echo
            cat links-report.md
          } > combined-report.md
          {
            echo "report<<EOF"
            cat combined-report.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: weekly-refresh/auto
          base: master
          delete-branch: false
          commit-message: "weekly-refresh: regenerate dashboard"
          title: "weekly-refresh: ${{ github.run_id }}"
          body: ${{ steps.combine.outputs.report }}
          labels: |
            weekly-refresh
            automated
          add-paths: |
            docs/index.html
            urgent.md
